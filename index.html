<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .main-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            padding: 12px 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-button:hover {
            color: #764ba2;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .response-box {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.95em;
            color: #333;
            display: none;
        }

        .response-box.active {
            display: block;
        }

        .response-box.loading {
            color: #667eea;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.active {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 30px 0;
        }

        .chat-messages {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: 20px;
            text-align: right;
        }

        .message.assistant {
            background: #e8e8e8;
            color: #333;
            margin-right: 20px;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 0.9em;
        }

        .health-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Gemini API Server</h1>
            <p>Fast, easy access to Google Gemini via REST API</p>
            <div id="status" style="margin-top: 15px; font-size: 0.95em;">
                <span class="health-indicator"></span>
                <span id="statusText">Checking...</span>
            </div>
        </div>

        <div class="main-card">
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('generate')">Generate</button>
                <button class="tab-button" onclick="switchTab('chat')">Chat</button>
                <button class="tab-button" onclick="switchTab('models')">Models</button>
            </div>

            <!-- Generate Tab -->
            <div id="generate" class="tab-content active">
                <h2>Generate Content</h2>
                <p style="color: #666; margin-bottom: 20px;">Ask Gemini a single question</p>

                <div class="form-group">
                    <label for="prompt">Your prompt:</label>
                    <textarea id="prompt" placeholder="Ask me anything..."></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="model-gen">Model: <button style="width: auto; padding: 4px 12px; font-size: 0.85em; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px;" onclick="loadModels(); return false;">🔄 Refresh</button></label>
                        <select id="model-gen">
                            <option value="">Loading models...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="stream-gen" checked> Stream response
                        </label>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="generate()">Generate</button>
                    <button class="btn-secondary" onclick="clearGen()">Clear</button>
                </div>

                <div id="gen-status" class="status"></div>
                <div id="gen-response" class="response-box"></div>
            </div>

            <!-- Chat Tab -->
            <div id="chat" class="tab-content">
                <h2>Chat</h2>
                <p style="color: #666; margin-bottom: 20px;">Multi-turn conversation</p>

                <div id="chatMessages" class="chat-messages">
                    <div style="color: #999; text-align: center; padding: 20px;">
                        Start a new chat by sending a message
                    </div>
                </div>

                <div class="form-group">
                    <label for="chatMsg">Message:</label>
                    <textarea id="chatMsg" placeholder="Type your message..."></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="sendChat()">Send</button>
                    <button class="btn-secondary" onclick="newChat()">New Chat</button>
                </div>

                <div id="chat-status" class="status"></div>
            </div>

            <!-- Models Tab -->
            <div id="models" class="tab-content">
                <h2>Available Models</h2>
                <p style="color: #666; margin-bottom: 20px;">Models available on your account</p>

                <button class="btn-primary" onclick="listModels()" style="width: 200px;">Load Models</button>

                <div id="models-response" class="response-box" style="display: none; margin-top: 20px;"></div>
                <div id="models-list" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div class="footer">
            <p>💡 Tip: Use the interactive API docs at <a href="/docs" style="color: white; text-decoration: underline;">/docs</a></p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentChatId = null;

        // Check server health
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                document.getElementById('statusText').textContent = 'Server running ✓';
                document.getElementById('statusText').style.color = '#4caf50';
                
                // Load models
                loadModels();
            } catch (e) {
                document.getElementById('statusText').textContent = 'Server not responding ✗';
                document.querySelector('.health-indicator').style.background = '#f44336';
            }
        }

        // Tab switching
        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        // Generate content
        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            const model = document.getElementById('model-gen').value;
            const stream = document.getElementById('stream-gen').checked;

            if (!prompt) {
                showStatus('gen-status', 'Please enter a prompt', 'error');
                return;
            }

            const responseBox = document.getElementById('gen-response');
            const statusBox = document.getElementById('gen-status');
            
            responseBox.textContent = 'Loading...';
            responseBox.classList.add('active', 'loading');
            statusBox.classList.remove('active');

            try {
                if (stream) {
                    const response = await fetch(`${API_BASE}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt, model: model || null, stream: true })
                    });

                    responseBox.textContent = '';
                    responseBox.classList.remove('loading');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        responseBox.textContent += decoder.decode(value);
                        responseBox.scrollTop = responseBox.scrollHeight;
                    }
                } else {
                    const response = await fetch(`${API_BASE}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt, model: model || null, stream: false })
                    });

                    const data = await response.json();
                    responseBox.classList.remove('loading');
                    
                    let display = data.text || '';
                    
                    // Add images
                    if (data.images && data.images.length > 0) {
                        display += '\n\n📸 IMAGES:\n';
                        data.images.forEach((img, i) => {
                            display += `\n[Image ${i+1}: ${img.title}]\n${img.url}\n`;
                        });
                    }
                    
                    // Add videos
                    if (data.videos && data.videos.length > 0) {
                        display += '\n\n🎬 VIDEOS:\n';
                        data.videos.forEach((vid, i) => {
                            display += `\n[Video ${i+1}: ${vid.title}]\n${vid.url}\n`;
                        });
                    }
                    
                    // Add media/audio
                    if (data.media && data.media.length > 0) {
                        display += '\n\n🎵 MEDIA:\n';
                        data.media.forEach((m, i) => {
                            display += `\n[Media ${i+1}: ${m.title}]\n${m.url}\n`;
                        });
                    }
                    
                    responseBox.textContent = display;
                }
            } catch (e) {
                responseBox.classList.remove('loading');
                showStatus('gen-status', `Error: ${e.message}`, 'error');
            }
        }

        // Chat functions
        async function startNewChat(firstMsg) {
            try {
                const response = await fetch(`${API_BASE}/chat/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: firstMsg })
                });

                const data = await response.json();
                currentChatId = data.session_id;

                const messagesBox = document.getElementById('chatMessages');
                messagesBox.innerHTML = '';

                addChatMessage('You', firstMsg, 'user');
                
                let aiResponse = data.text || 'No response';
                if (data.images && data.images.length > 0) {
                    aiResponse += `\n📸 [${data.images.length} image(s)]`;
                }
                if (data.videos && data.videos.length > 0) {
                    aiResponse += `\n🎬 [${data.videos.length} video(s)]`;
                }
                if (data.media && data.media.length > 0) {
                    aiResponse += `\n🎵 [${data.media.length} media file(s)]`;
                }
                
                addChatMessage('Assistant', aiResponse, 'assistant');

                showStatus('chat-status', `Chat started (ID: ${currentChatId})`, 'success');
            } catch (e) {
                showStatus('chat-status', `Error: ${e.message}`, 'error');
            }
        }

        async function sendChat() {
            const message = document.getElementById('chatMsg').value.trim();
            if (!message) return;

            if (!currentChatId) {
                startNewChat(message);
                document.getElementById('chatMsg').value = '';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/chat/reply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentChatId, prompt: message })
                });

                const data = await response.json();
                addChatMessage('You', message, 'user');
                
                let aiResponse = data.text || 'No response';
                if (data.images && data.images.length > 0) {
                    aiResponse += `\n📸 [${data.images.length} image(s)]`;
                }
                if (data.videos && data.videos.length > 0) {
                    aiResponse += `\n🎬 [${data.videos.length} video(s)]`;
                }
                if (data.media && data.media.length > 0) {
                    aiResponse += `\n🎵 [${data.media.length} media file(s)]`;
                }
                
                addChatMessage('Assistant', aiResponse, 'assistant');
                document.getElementById('chatMsg').value = '';
            } catch (e) {
                showStatus('chat-status', `Error: ${e.message}`, 'error');
            }
        }

        function addChatMessage(sender, text, type) {
            const messagesBox = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            messagesBox.appendChild(msgDiv);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        function newChat() {
            currentChatId = null;
            document.getElementById('chatMessages').innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">Start a new chat by sending a message</div>';
            document.getElementById('chatMsg').value = '';
            showStatus('chat-status', '', 'info');
        }

        // Models
        async function loadModels() {
            try {
                console.log('📡 Fetching models...');
                const response = await fetch(`${API_BASE}/models`);
                const data = await response.json();
                
                console.log('📊 Models data:', data);
                
                const select = document.getElementById('model-gen');
                
                if (data.models && data.models.length > 0) {
                    console.log(`✅ Found ${data.models.length} model(s)`);
                    data.models.forEach(model => {
                        console.log(`  - ${model.display_name} (${model.model_name})`);
                        const option = document.createElement('option');
                        option.value = model.model_name;
                        option.textContent = model.display_name;
                        select.appendChild(option);
                    });
                } else {
                    console.warn('⚠️ No models returned');
                }
            } catch (e) {
                console.error('❌ Error loading models:', e);
            }
        }

        async function listModels() {
            try {
                const response = await fetch(`${API_BASE}/models`);
                const data = await response.json();
                
                const box = document.getElementById('models-response');
                const list = document.getElementById('models-list');
                
                list.innerHTML = '';
                if (data.models && data.models.length > 0) {
                    data.models.forEach(model => {
                        const div = document.createElement('div');
                        div.style.cssText = 'padding: 12px; background: #f9f9f9; border-left: 3px solid #667eea; margin-bottom: 10px; border-radius: 4px;';
                        div.innerHTML = `<strong>${model.display_name}</strong><br><small style="color: #666;">${model.model_name}</small>`;
                        list.appendChild(div);
                    });
                }
                
                showStatus('chat-status', `${data.models?.length || 0} models available`, 'success');
            } catch (e) {
                showStatus('chat-status', `Error: ${e.message}`, 'error');
            }
        }

        // Utilities
        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = `status active ${type}`;
            setTimeout(() => {
                if (type !== 'error') el.classList.remove('active');
            }, 5000);
        }

        function clearGen() {
            document.getElementById('prompt').value = '';
            document.getElementById('gen-response').classList.remove('active');
            document.getElementById('gen-status').classList.remove('active');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', checkHealth);
    </script>
</body>
</html>
